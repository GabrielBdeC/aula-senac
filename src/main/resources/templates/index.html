<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lista de Tarefas</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f6f8;
			color: #1f2933;
		}

		main {
			width: min(920px, calc(100% - 32px));
			margin: 40px auto;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 32px;
		}

		.subtitulo {
			margin: 0 0 28px;
			color: #52606d;
		}

		.formulario,
		.lista {
			background: #ffffff;
			border: 1px solid #d9e2ec;
			border-radius: 8px;
			padding: 20px;
			box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
		}

		.formulario {
			display: flex;
			gap: 12px;
			margin-bottom: 20px;
		}

		input[type="text"] {
			flex: 1;
			min-width: 0;
			border: 1px solid #bcccdc;
			border-radius: 6px;
			padding: 12px 14px;
			font-size: 16px;
		}

		button {
			border: 0;
			border-radius: 6px;
			padding: 12px 16px;
			font-weight: 700;
			cursor: pointer;
		}

		.salvar {
			background: #0b7285;
			color: #ffffff;
		}

		.concluir {
			background: #2f9e44;
			color: #ffffff;
		}

		.excluir {
			background: #c92a2a;
			color: #ffffff;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 10px;
			border-bottom: 1px solid #e4e7eb;
			text-align: left;
			vertical-align: middle;
		}

		th {
			color: #52606d;
			font-size: 14px;
			text-transform: uppercase;
		}

		.acoes {
			display: flex;
			gap: 8px;
			justify-content: flex-end;
		}

		.status {
			display: inline-block;
			border-radius: 999px;
			padding: 6px 10px;
			font-size: 13px;
			font-weight: 700;
		}

		.pendente {
			background: #fff3bf;
			color: #8d6b00;
		}

		.finalizada {
			background: #d3f9d8;
			color: #2b8a3e;
		}

		.vazio {
			margin: 0;
			color: #52606d;
		}

		@media (max-width: 720px) {
			.formulario {
				flex-direction: column;
			}

			table,
			thead,
			tbody,
			tr,
			th,
			td {
				display: block;
			}

			thead {
				display: none;
			}

			tr {
				border-bottom: 1px solid #e4e7eb;
				padding: 12px 0;
			}

			td {
				border: 0;
				padding: 8px 0;
			}

			.acoes {
				justify-content: flex-start;
			}
		}
	</style>
</head>
<body>
	<main>
		<h1>Lista de Tarefas</h1>
		<p class="subtitulo">CRUD com Spring Boot, Thymeleaf, JPA e MySQL</p>

		<form class="formulario" th:action="@{/tarefas}" method="post">
			<input type="text" name="titulo" placeholder="Digite uma nova tarefa" required autofocus>
			<button class="salvar" type="submit">Salvar</button>
		</form>

		<section class="lista">
			<p class="vazio" th:if="${#lists.isEmpty(tarefas)}">Nenhuma tarefa cadastrada.</p>

			<table th:if="${!#lists.isEmpty(tarefas)}">
				<thead>
					<tr>
						<th>ID</th>
						<th>Titulo</th>
						<th>Status</th>
						<th>Data de conclusao</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="tarefa : ${tarefas}">
						<td th:text="${tarefa.id}">1</td>
						<td th:text="${tarefa.titulo}">Estudar Spring Boot</td>
						<td>
							<span class="status finalizada" th:if="${tarefa.concluida}">Concluida</span>
							<span class="status pendente" th:unless="${tarefa.concluida}">Pendente</span>
						</td>
						<td th:text="${tarefa.dataConclusao != null ? #temporals.format(tarefa.dataConclusao, 'dd/MM/yyyy') : '-'}">-</td>
						<td>
							<div class="acoes">
								<form th:if="${!tarefa.concluida}" th:action="@{/tarefas/{id}/concluir(id=${tarefa.id})}" method="post">
									<input type="hidden" name="_method" value="put">
									<button class="concluir" type="submit">Concluir</button>
								</form>

								<form th:action="@{/tarefas/{id}(id=${tarefa.id})}" method="post">
									<input type="hidden" name="_method" value="delete">
									<button class="excluir" type="submit">Excluir</button>
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>
</html>
