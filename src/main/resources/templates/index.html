<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lista de Tarefas</title>
	<link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>
	<main>
		<h1>Lista de Tarefas</h1>

		<form class="formulario" th:action="@{/tarefas}" method="post">
			<input type="text" name="titulo" placeholder="Digite uma nova tarefa" required autofocus>
			<button class="salvar" type="submit">Salvar</button>
		</form>

		<section class="lista">
			<p class="vazio" th:if="${#lists.isEmpty(tarefas)}">Nenhuma tarefa cadastrada.</p>

			<table th:if="${!#lists.isEmpty(tarefas)}">
				<thead>
					<tr>
						<th>ID</th>
						<th>Titulo</th>
						<th>Status</th>
						<th>Data de conclusao</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="tarefa : ${tarefas}">
						<td th:text="${tarefa.id}">1</td>
						<td th:text="${tarefa.titulo}">Estudar Spring Boot</td>
						<td>
							<span class="status finalizada" th:if="${tarefa.concluida}">Concluida</span>
							<span class="status pendente" th:unless="${tarefa.concluida}">Pendente</span>
						</td>
						<td th:text="${tarefa.dataConclusao != null ? #temporals.format(tarefa.dataConclusao, 'dd/MM/yyyy') : '-'}">
							-</td>
						<td>
							<div class="acoes">
								<form th:if="${!tarefa.concluida}" th:action="@{/tarefas/{id}/concluir(id=${tarefa.id})}" method="post">
									<input type="hidden" name="_method" value="put">
									<button class="concluir" type="submit">Concluir</button>
								</form>

								<form th:action="@{/tarefas/{id}(id=${tarefa.id})}" method="post">
									<input type="hidden" name="_method" value="delete">
									<button class="excluir" type="submit">Excluir</button>
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>

</html>
